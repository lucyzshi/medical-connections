<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discovery Rounds</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>Discovery Rounds</h1>

    <div id="progress"></div>

    <div id="game">
      <p id="event"></p>

      <input type="number" id="guess" placeholder="Enter year" />

      <div class="buttons">
        <button id="submitBtn">Submit</button>
        <button id="nextBtn" class="hidden">Next</button>
      </div>

      <div id="feedback"></div>
    </div>

    <div id="final" class="hidden"></div>
  </div>
  
  <script type="module" src="beta.js"></script>
</body>
</html>
