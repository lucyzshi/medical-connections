<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discovery Rounds</title>
  <link rel="stylesheet" href="style2.css" />
</head>
<body>
 <div class="container">
  <h1 class="title">Discovery Rounds</h1>

<div id="game">
  <div class="card">
    <div class="progress-wrapper">
      <div id="progress-bar"></div>
    </div>

    <div id="progress" class="progress-text"></div>

    <p id="event" class="event"></p>
    
    <input 
  type="text" 
  id="guess" 
  placeholder="Type your answer..." 
  autocapitalize="off" 
  autocomplete="off" 
/>
    
    <div class="buttons">
      <button id="submitBtn">Submit</button>
      <button id="nextBtn" class="hidden">Next</button>
      <button id="clueBtn">Next Clue</button>
    </div>

    <div id="feedback"></div>
  </div>
</div>

<div id="final" class="hidden"></div>
  
</div>
  <script type="module" src="beta.js"></script>
</body>
</html>
